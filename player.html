<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon7 Player</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
  background: black;
}

/* TOP BAR */
.top {
  position: absolute;
  top: 0;
  width: 100%;
  padding: 20px;
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* BOTTOM CONTROLS */
.controls {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 20px;
  color: white;
}

/* BOTÕES */
.btn {
  background: rgba(255,255,255,0.2);
  border: none;
  padding: 10px 15px;
  color: white;
  border-radius: 10px;
  margin: 5px;
}

/* PROGRESS BAR */
input[type=range] {
  width: 100%;
}

/* CENTER PLAY */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 50px;
  color: white;
}
</style>
</head>

<body>

<video id="video"></video>

<!-- TOPO -->
<div class="top">
  <button class="btn" onclick="voltar()">←</button>
  <span id="titulo">Carregando...</span>
  <button class="btn" onclick="pular()">Pular</button>
</div>

<!-- CENTRO -->
<div class="center" id="playBtn" onclick="playPause()">▶</div>

<!-- CONTROLES -->
<div class="controls">
  <input type="range" id="barra" value="0">

  <div>
    <button class="btn" onclick="playPause()">Play/Pause</button>
    <button class="btn" onclick="full()">Tela Cheia</button>
    <button class="btn" onclick="proximo()">Próximo</button>
  </div>
</div>

<script>
const video = document.getElementById("video");
const barra = document.getElementById("barra");
const playBtn = document.getElementById("playBtn");
const titulo = document.getElementById("titulo");

// pegar link
const params = new URLSearchParams(window.location.search);
const link = params.get("video");

video.src = link;

// PLAY / PAUSE
function playPause() {
  if(video.paused){
    video.play();
    playBtn.style.display = "none";
  } else {
    video.pause();
    playBtn.style.display = "block";
  }
}

// BARRA
video.ontimeupdate = () => {
  barra.value = (video.currentTime / video.duration) * 100;
};

barra.oninput = () => {
  video.currentTime = (barra.value / 100) * video.duration;
};

// VOLTAR
function voltar(){
  history.back();
}

// FULLSCREEN
function full(){
  video.requestFullscreen();
}

// PULAR (ex: abertura)
function pular(){
  video.currentTime += 60; // pula 1 minuto
}

// PRÓXIMO EP
function proximo(){
  alert("Próximo episódio (vamos implementar depois)");
}
</script>

</body>
</html>
