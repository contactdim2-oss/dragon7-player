<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dragon7 Player</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: cover;
    }

    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 20;
      background: linear-gradient(to bottom, rgba(0,0,0,0.75), rgba(0,0,0,0));
    }

    .back {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-size: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }

    .title {
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 75vw;
    }

    .skip {
      position: absolute;
      right: 16px;
      bottom: 90px;
      z-index: 20;
      background: rgba(0,0,0,0.7);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 16px;
      cursor: pointer;
    }

    .shadow-bottom {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 120px;
      background: linear-gradient(to top, rgba(0,0,0,0.7), rgba(0,0,0,0));
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="back" onclick="voltar()">←</div>
      <div class="title" id="titulo">Dragon7</div>
    </div>

    <video id="player" controls autoplay playsinline webkit-playsinline></video>

    <button class="skip" onclick="pular()">Pular abertura</button>

    <div class="shadow-bottom"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const videoUrl = params.get("video") || "";
    const titulo = params.get("titulo") || "Dragon7";
    const skip = parseInt(params.get("skip") || "85", 10);

    const player = document.getElementById("player");
    const tituloEl = document.getElementById("titulo");

    tituloEl.textContent = titulo;
    player.src = videoUrl;

    function voltar() {
      history.back();
    }

    function pular() {
      player.currentTime = skip;
    }
  </script>
</body>
      </html>
