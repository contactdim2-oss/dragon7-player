<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dragon7 Player</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    .player-wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
    }

    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.75), rgba(0,0,0,0));
      z-index: 20;
      pointer-events: none;
    }

    .back-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.18);
      font-size: 26px;
      line-height: 1;
      pointer-events: auto;
      cursor: pointer;
      user-select: none;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
      max-width: 70vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }

    .skip-btn {
      position: absolute;
      right: 20px;
      bottom: 90px;
      z-index: 20;
      padding: 12px 16px;
      border-radius: 10px;
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      user-select: none;
    }

    .center-play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 18;
      width: 82px;
      height: 82px;
      border-radius: 50%;
      background: rgba(0,0,0,0.45);
      border: 2px solid rgba(255,255,255,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      color: #fff;
      cursor: pointer;
      user-select: none;
    }

    .bottom-shadow {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 140px;
      background: linear-gradient(to top, rgba(0,0,0,0.78), rgba(0,0,0,0));
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="player-wrap">
    <div class="top-bar">
      <div class="back-btn" onclick="goBack()">←</div>
      <div class="title" id="title">Dragon7</div>
    </div>

    <video id="player" controls autoplay playsinline webkit-playsinline>
      <source id="source" src="" type="video/mp4" />
      Seu navegador não suporta vídeo.
    </video>

    <div class="center-play" id="centerPlay" onclick="togglePlay()">▶</div>

    <button class="skip-btn" id="skipBtn" onclick="skipIntro()">Pular abertura</button>

    <div class="bottom-shadow"></div>
  </div>

  <script>
    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    const player = document.getElementById("player");
    const source = document.getElementById("source");
    const title = document.getElementById("title");
    const centerPlay = document.getElementById("centerPlay");
    const skipBtn = document.getElementById("skipBtn");

    const videoUrl = getParam("video") || "";
    const videoTitle = getParam("titulo") || "Dragon7";
    const skipTime = parseInt(getParam("skip") || "85", 10);

    title.textContent = videoTitle;

    if (videoUrl) {
      source.src = videoUrl;
      player.load();
    }

    function skipIntro() {
      if (!isNaN(skipTime)) {
        player.currentTime = skipTime;
      }
    }

    function togglePlay() {
      if (player.paused) {
        player.play();
      } else {
        player.pause();
      }
    }

    function goBack() {
      if (history.length > 1) {
        history.back();
      } else {
        window.close();
      }
    }

    player.addEventListener("pause", () => {
      centerPlay.style.display = "flex";
    });

    player.addEventListener("play", () => {
      centerPlay.style.display = "none";
    });

    player.addEventListener("ended", () => {
      centerPlay.style.display = "flex";
    });

    document.addEventListener("click", function (e) {
      if (e.target === player) {
        togglePlay();
      }
    });
  </script>
</body>
</html>
